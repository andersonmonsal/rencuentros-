<div class="forgot-password-wrapper">
  <div class="forgot-password-card">
    <div class="logo-section">
      <div class="logo">🔑</div>
      <h1>¿Olvidaste tu contraseña?</h1>
      <p>Ingresa tu correo electrónico y te enviaremos instrucciones para restablecerla</p>
    </div>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
      <label for="email">Correo electrónico</label>
      <input 
        id="email" 
        formControlName="email" 
        type="email" 
        placeholder="nombre@correo.com"
        [class.input-error]="email?.invalid && email?.touched"
      />
      <div class="error-message" *ngIf="email?.invalid && email?.touched">
        <span *ngIf="email?.errors?.['required']">El correo es obligatorio</span>
        <span *ngIf="email?.errors?.['email']">Ingresa un correo válido</span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="!forgotPasswordForm.valid">
        Enviar enlace de recuperación
      </button>
    </form>

    <div class="back-to-login">
      <a routerLink="/" class="link">Volver al inicio de sesión</a>
    </div>
  </div>
</div>
