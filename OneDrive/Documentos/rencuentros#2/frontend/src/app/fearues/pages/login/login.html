<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-section">
      <div class="logo">💬</div>
      <h1>Encuentros</h1>
      <p>Organiza, chatea y no olvides ningún plan</p>
    </div>

    <form [formGroup]="loginForm">
      <label for="email">Correo</label>
      <input 
        id="email" 
        formControlName="email" 
        type="email" 
        placeholder="nombre@correo.com"
        [class.input-error]="email?.invalid && email?.touched"
      />
      <div class="error-message" *ngIf="email?.invalid && email?.touched">
        <span *ngIf="email?.errors?.['required']">El correo es obligatorio</span>
        <span *ngIf="email?.errors?.['email']">Ingresa un correo válido</span>
      </div>

      <label for="password">Contraseña</label>
      <input 
        id="password" 
        formControlName="password" 
        type="password" 
        placeholder="••••••••" 
        autocomplete="off"
        [class.input-error]="password?.invalid && password?.touched"
      />
      <div class="error-message" *ngIf="password?.invalid && password?.touched">
        <span *ngIf="password?.errors?.['required']">La contraseña es obligatoria</span>
        <span *ngIf="password?.errors?.['minlength']">La contraseña debe tener al menos 8 caracteres</span>
      </div>

      <div class="options">
        <label>
          <input type="checkbox" formControlName="rememberMe" /> Recordarme
        </label>
        <a routerLink="/forgot-password" class="link">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-primary" (click)="onLogin()">Iniciar sesión</button>
    </form>

    <div class="divider"><span>o</span></div>

    <button class="btn-outline">
      <i class="icon-google"></i> Continuar con Google
    </button>

    <p class="signup">
      ¿No tienes cuenta? <a routerLink="/sign-up" class="link">Crea una</a>
    </p>
  </div>
</div>
