<div class="reset-password-wrapper">
  <div class="reset-password-card">
    <div class="logo-section">
      <div class="logo">🔐</div>
      <h1>Restablecer contraseña</h1>
      <p>Ingresa tu nueva contraseña</p>
    </div>

    <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
      <label for="nuevaContrasena">Nueva contraseña</label>
      <input 
        id="nuevaContrasena" 
        formControlName="nuevaContrasena" 
        type="password" 
        placeholder="Mínimo 8 caracteres"
        autocomplete="new-password"
        [class.input-error]="nuevaContrasena?.invalid && nuevaContrasena?.touched"
      />
      <div class="error-message" *ngIf="nuevaContrasena?.invalid && nuevaContrasena?.touched">
        <span *ngIf="nuevaContrasena?.errors?.['required']">La contraseña es obligatoria</span>
        <span *ngIf="nuevaContrasena?.errors?.['minlength']">La contraseña debe tener al menos 8 caracteres</span>
      </div>

      <label for="confirmarContrasena">Confirmar contraseña</label>
      <input 
        id="confirmarContrasena" 
        formControlName="confirmarContrasena" 
        type="password" 
        placeholder="Repite tu nueva contraseña"
        autocomplete="new-password"
        [class.input-error]="confirmarContrasena?.invalid && confirmarContrasena?.touched"
      />
      <div class="error-message" *ngIf="confirmarContrasena?.invalid && confirmarContrasena?.touched">
        <span *ngIf="confirmarContrasena?.errors?.['required']">Debes confirmar tu contraseña</span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="!resetPasswordForm.valid">
        Restablecer contraseña
      </button>
    </form>

    <div class="back-to-login">
      <a routerLink="/" class="link">Volver al inicio de sesión</a>
    </div>
  </div>
</div>
